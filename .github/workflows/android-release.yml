name: Flutter Android Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Generate localization keys
        run: flutter pub run easy_localization:generate -S assets/translations -O lib -f keys -o locale_keys.g.dart

      - name: Run static analysis
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Build APK
        run: flutter build apk --release --dart-define=BASE_URL=https://banghasyim.net/ZAHIR4 --dart-define=PRINT_BASE_URL=https://banghasyim.net/ZAHIR4/sale/sale/prints

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Set release tag
        run: echo "RELEASE_TAG=main-${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: APK Release ${{ env.RELEASE_TAG }}
          body: |
            Automated APK release from main branch.
            Commit: ${{ github.sha }}
          files: build/app/outputs/flutter-apk/app-release.apk
